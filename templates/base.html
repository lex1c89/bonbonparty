<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бон Бон Праздник - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎈</span>
                <span class="logo-text">Бон Бон Праздник</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="{% if active == 'home' %}active{% endif %}">Главная</a></li>
                <li><a href="/about" class="{% if active == 'about' %}active{% endif %}">О нас</a></li>
                <li><a href="/gallery" class="{% if active == 'gallery' %}active{% endif %}">Примеры</a></li>
                <li><a href="/contact" class="{% if active == 'contact' %}active{% endif %}">Контакты</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>© 2025 Бон Бон Праздник. Создаём волшебство ✨</p>
    </footer>
</body>
</html>
